<!doctype html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Pantalla de cocina — Eastern Lake</title>
<link rel="icon" type="image/png" sizes="32x32" href="img/favicon-32.png">
<link rel="apple-touch-icon" href="img/favicon-180.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,600;0,700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
<link rel="stylesheet" href="css/kitchen.css">
</head>
<body class="kitchen-body">

  <div id="pinGate" class="pin-gate" style="display:none;">
    <div>
      <h1 style="font-family: var(--font-display); font-size: 26px;">Pantalla de cocina</h1>
      <p>Esta pantalla necesita tu PIN de cocina. Pídeselo a quien configuró el sitio y guarda esta página exacta en marcadores — el PIN queda en la dirección, así no tendrás que escribirlo de nuevo.</p>
    </div>
  </div>

  <div id="kitchenApp" style="display:none;">
    <header class="kitchen-header">
      <div style="display:flex; align-items:center;">
        <span class="brand" style="font-size: 17px;">
          <img src="img/logo-icon.png" alt="" class="brand-icon" style="height: 32px; width: 32px;">
          <span class="brand-text">Eastern Lake</span>
        </span>
        <h1 style="font-size: 15px; margin-left: 12px; opacity: 0.8;">Cocina</h1>
      </div>
      <div class="kitchen-status">
        <span class="status-dot" id="statusDot"></span>
        <span id="statusText">Conectando…</span>
      </div>
    </header>
    <main class="kitchen-board" id="board">
      <div class="kitchen-empty">No hay órdenes activas.</div>
    </main>
  </div>

  <script src="js/config.js"></script>
  <script src="js/kitchen.js"></script>
</body>
</html>
