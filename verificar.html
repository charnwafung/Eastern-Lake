<!doctype html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Verificar mi orden — Eastern Lake</title>
<meta name="description" content="Verifica el estado de tu orden en Eastern Lake, Restaurante Chino.">
<link rel="icon" type="image/png" sizes="32x32" href="img/favicon-32.png">
<link rel="icon" type="image/png" sizes="512x512" href="img/favicon-512.png">
<link rel="apple-touch-icon" href="img/favicon-180.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,500;0,600;0,700;1,500&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
</head>
<body>

<header class="site-header">
  <div class="wrap">
    <a href="index.html" class="brand">
      <img src="img/logo-icon.png" alt="" class="brand-icon">
      <span class="brand-text">Eastern Lake<span class="brand-tagline">Restaurante Chino</span></span>
    </a>
    <div class="header-actions">
      <span class="header-status" id="openStatus">Verificando horario…</span>
      <a href="index.html" class="cart-button" style="text-decoration:none; display:inline-block;">Ordenar</a>
    </div>
  </div>
</header>

<main>
  <section style="padding: 56px 0 90px;">
    <div class="wrap" style="max-width: 480px;">
      <span class="eyebrow" style="color: var(--chili);">Estado de la orden</span>
      <h1 style="font-family: var(--font-display); font-size: 30px; margin: 10px 0 8px;">Verificar mi orden</h1>
      <p style="color: var(--ink-soft); font-size: 13.5px; margin-bottom: 24px;">Ingresa tu número de orden y teléfono para ver el estado.</p>

      <div class="field-row">
        <div class="field">
          <label for="lookupOrderId">Número de orden</label>
          <input type="text" id="lookupOrderId" placeholder="070326-01">
        </div>
        <div class="field">
          <label for="lookupPhone">Teléfono</label>
          <input type="tel" id="lookupPhone" placeholder="(787) 000-0000">
        </div>
      </div>
      <button class="btn-primary" id="lookupBtn" style="width:100%;">Buscar</button>
      <div id="lookupResult" style="margin-top: 20px;"></div>
    </div>
  </section>
</main>

<footer>
  <div class="wrap">
    <span id="footAddr">—</span>
    <span id="footPhone">—</span>
    <a href="horario.html" style="color: inherit;">Horario y ubicación</a>
  </div>
</footer>

<script src="js/config.js"></script>
<script src="js/verificar.js"></script>
</body>
</html>
