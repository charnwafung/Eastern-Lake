<!doctype html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Horario y ubicación — Eastern Lake</title>
<meta name="description" content="Horario y lugar para recoger tu orden en Eastern Lake, Restaurante Chino.">
<link rel="icon" type="image/png" sizes="32x32" href="img/favicon-32.png">
<link rel="icon" type="image/png" sizes="512x512" href="img/favicon-512.png">
<link rel="apple-touch-icon" href="img/favicon-180.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,500;0,600;0,700;1,500&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
</head>
<body>

<header class="site-header">
  <div class="wrap">
    <a href="index.html" class="brand">
      <img src="img/logo-icon.png" alt="" class="brand-icon">
      <span class="brand-text">Eastern Lake<span class="brand-tagline">Restaurante Chino</span></span>
    </a>
    <div class="header-actions">
      <span class="header-status" id="openStatus">Verificando horario…</span>
      <a href="verificar.html" class="verify-order-link">Verificar orden</a>
      <a href="index.html" class="cart-button" style="text-decoration:none; display:inline-block;">Ordenar</a>
    </div>
  </div>
</header>

<main>
  <section style="padding: 56px 0 90px;">
    <div class="wrap" style="max-width: 640px;">
      <span class="eyebrow" style="color: var(--chili);">Horario y ubicación</span>
      <h1 style="font-family: var(--font-display); font-size: 32px; margin: 10px 0 24px;">¿Dónde y cuándo recoger?</h1>

      <div id="hoursTable" style="font-family: var(--font-mono); font-size: 14px; line-height: 2; margin-bottom: 24px;"></div>

      <p style="color: var(--ink-soft); font-size: 14px; margin-bottom: 4px;" id="fullAddress"></p>
      <p style="color: var(--ink-soft); font-size: 14px; margin-bottom: 28px;" id="fullPhone"></p>

      <a href="index.html" class="btn-primary" style="display:inline-block; text-decoration:none;">Ver menú y ordenar</a>
    </div>
  </section>
</main>

<footer>
  <div class="wrap">
    <span id="footAddr">—</span>
    <span id="footPhone">—</span>
    <a href="verificar.html" style="color: inherit;">Verificar mi orden</a>
  </div>
</footer>

<script src="js/config.js"></script>
<script src="js/horario.js"></script>
</body>
</html>
